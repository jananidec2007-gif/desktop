<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Make a Wish</title>
    <style>
        body {
            background-image: url("back.jpg");
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
        }

        /* Cake Styling */
        .cake-container { position: relative; display: flex; flex-direction: column; align-items: center; margin-top: 100px; }
        .plate { width: 300px; height: 15px; background: #e0e0e0; border-radius: 50%; position: absolute; bottom: -10px; }
        .layer { position: relative; width: 250px; height: 80px; background: #f48fb1; border-radius: 20px 20px 5px 5px; }
        .layer-top { width: 180px; height: 60px; background: #ffc1e3; bottom: -10px; z-index: 2; }
        .icing { position: absolute; top: 0; left: 0; width: 100%; height: 25px; background: #ffffff; border-radius: 20px 20px 0 0; }
        
        /* Candle & Flame */
        .candle-container { position: absolute; top: -70px; left: 50%; transform: translateX(-50%); width: 20px; height: 80px; z-index: 10; }
        .candle { width: 15px; height: 60px; background: repeating-linear-gradient(45deg, #ffffff, #ffffff 5px, #ff4081 5px, #ff4081 10px); border-radius: 3px; position: absolute; bottom: 0; }
        .flame { width: 12px; height: 25px; background: radial-gradient(circle at bottom, #fff, #f1c40f, #e67e22, transparent); border-radius: 50% 50% 20% 20%; position: absolute; top: -22px; left: 2px; box-shadow: 0 0 15px #e67e22; animation: flicker 0.1s infinite alternate; transition: opacity 0.5s ease; }
        @keyframes flicker { 0% { transform: scale(1); opacity: 0.9; } 100% { transform: scale(1.1); opacity: 1; } }
        .off { opacity: 0 !important; animation: none !important; }

        /* UI Elements */
        #btn { margin-top: 60px; padding: 12px 25px; background: #ff4081; border: none; border-radius: 50px; color: white; cursor: pointer; font-size: 18px; }
        #status { margin-top: 20px; font-weight: bold; color: #ad1457; text-align: center; }
    </style>
</head>
<body>

    <div class="cake-container">
        <div class="plate"></div>
        <div class="candle-container">
            <div class="flame" id="flame"></div>
            <div class="candle"></div>
        </div>
        <div class="layer layer-top"><div class="icing"></div></div>
        <div class="layer"><div class="icing"></div></div>
    </div>

    <button id="btn" onclick="startMic()">Start Mic & Blow! 🎂</button>
    <p id="status">Ready for your wish?</p>

    <script>
        async function startMic() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const flame = document.getElementById('flame');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                status.innerText = "Mic is ON! Blow hard! 🎤";
                btn.style.display = "none";

                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);

                const dataArray = new Uint8Array(analyser.frequencyBinCount);

                function checkVolume() {
                    analyser.getByteFrequencyData(dataArray);
                    let volume = dataArray.reduce((a, b) => a + b) / dataArray.length;

                    if (volume > 40) {
                        flame.classList.add('off');
                        // Display the wish message
                        status.innerHTML = "<h2 style='color: #ff4081;'>Let your wish come true! ✨</h2>";
                        
                        // Stop microphone
                        stream.getTracks().forEach(t => t.stop());
                    } else {
                        requestAnimationFrame(checkVolume);
                    }
                }
                checkVolume();
            } catch (err) {
                status.innerText = "Error: Mic access denied.";
            }
        }
    </script>
</body>
</html>
